services:
  - type: web
    name: face-auth-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      # You MUST add the following variables in the Render Dashboard:
      # - MONGODB_URL
      # - MONGODB_DB_NAME
      # - JWT_SECRET_KEY
      # - EMBEDDING_ENCRYPTION_KEY
